<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="robots" content="noindex, nofollow">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OGS Tandem Tracker</title>
    <!-- Socket.io client — handles handshake, heartbeat, and reconnection automatically -->
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        :root {
            --bg: #0f0f1a;
            --card: #1a1a2e;
            --accent: #e94560;
            --text: #eaeaea;
            --muted: #888;
            --green: #22c55e;
            --amber: #f59e0b;
            --red: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            transition: background 0.6s ease;
        }
        body.my-turn { background: #052e16; }
        body.im-next { background: #1a1000; }

        body.alarm-active { animation: alarmBlink 0.4s ease 4; }
        @keyframes alarmBlink {
            0%   { background: #052e16; }
            25%  { background: #0a4a28; }
            50%  { background: #1a0a2e; }
            75%  { background: #052e16; }
            100% { background: #052e16; }
        }
        body.alarm-active .tracker.state-now { animation: alarmCard 0.6s ease 3; }
        @keyframes alarmCard {
            0%, 100% { box-shadow: 0 0 45px rgba(34,197,94,0.22); }
            50%      { box-shadow: 0 0 80px rgba(34,197,94,0.6), 0 0 120px rgba(34,197,94,0.3); }
        }

        h1 { font-size: 2em; margin-bottom: 6px; }
        .subtitle { color: var(--muted); margin-bottom: 32px; }

        .search-box {
            width: 100%; max-width: 500px;
            margin-bottom: 24px;
        }
        .search-box input {
            width: 100%; padding: 14px 18px;
            border: 2px solid #2a2a4a; border-radius: 10px;
            background: var(--card); color: var(--text); font-size: 1em;
            transition: border-color 0.3s;
        }
        .search-box input:focus { outline: none; border-color: #4a4a6a; }
        .search-box input.is-error { border-color: var(--red); }
        button {
            padding: 14px 28px; background: var(--accent);
            border: none; border-radius: 10px;
            color: white; font-size: 1em; cursor: pointer;
            transition: background 0.3s, transform 0.1s;
        }
        button:hover { background: #c73652; }
        button:active { transform: scale(0.97); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .tracker-wrap {
            position: relative;
            width: 100%; max-width: 500px;
            margin-bottom: 20px;
        }
        .tracker {
            width: 100%;
            background: var(--card); border: 2px solid #2a2a4a;
            border-radius: 18px; padding: 24px 22px 56px;
            transition: border-color 0.5s, box-shadow 0.5s;
        }
        .tracker.state-now {
            border-color: var(--green);
            box-shadow: 0 0 45px rgba(34,197,94,0.22);
        }
        .tracker.state-soon {
            border-color: var(--amber);
            box-shadow: 0 0 35px rgba(245,158,11,0.18);
            animation: trackerPulse 2s ease infinite;
        }
        @keyframes trackerPulse {
            0%, 100% { box-shadow: 0 0 35px rgba(245,158,11,0.18); }
            50%      { box-shadow: 0 0 55px rgba(245,158,11,0.32); }
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50%      { transform: scale(1.03); opacity: 0.85; }
        }

        .tracker-header {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 18px;
        }
        .tracker-title {
            font-size: 0.7em; text-transform: uppercase;
            letter-spacing: 2.5px; color: var(--muted); font-weight: 700;
        }
        .tracker-stepper { display: flex; align-items: center; gap: 6px; }
        .step-btn {
            width: 30px; height: 30px; border-radius: 8px;
            background: rgba(255,255,255,0.05); border: 1px solid #2a2a4a;
            color: var(--text); font-size: 1.1em; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            padding: 0; transition: all 0.2s;
        }
        .step-btn:hover { background: rgba(255,255,255,0.1); border-color: #3a3a5a; }
        .step-btn:active { transform: scale(0.92); }
        .step-count {
            font-size: 0.95em; font-weight: 700;
            color: var(--text); min-width: 22px; text-align: center;
        }
        .tracker-team-info {
            text-align: center; font-size: 0.72em;
            color: #555; margin: -8px 0 14px; letter-spacing: 0.5px;
        }
        .tracker-slots { display: flex; flex-direction: column; gap: 3px; }

        .tracker-row {
            display: flex; align-items: center; gap: 12px;
            padding: 11px 16px; border-radius: 12px;
            border: 2px solid transparent; cursor: pointer;
            transition: all 0.35s ease; position: relative;
        }
        .tracker-row:hover { background: rgba(255,255,255,0.025); }
        .tracker-row.is-you { border-color: rgba(255,255,255,0.08); background: rgba(255,255,255,0.02); }
        .tracker-row.is-current { border-color: var(--accent); background: rgba(233,69,96,0.07); box-shadow: 0 0 22px rgba(233,69,96,0.12); }
        .tracker-row.is-current.is-you { border-color: var(--green); background: rgba(34,197,94,0.1); box-shadow: 0 0 28px rgba(34,197,94,0.22); }
        .tracker-row.is-next { border-color: rgba(245,158,11,0.4); border-style: dashed; background: rgba(245,158,11,0.03); }
        .tracker-row::before {
            content: ''; position: absolute;
            left: -2px; top: 22%; bottom: 22%;
            width: 3px; border-radius: 2px;
            background: transparent; transition: background 0.35s;
        }
        .tracker-row.is-current::before { background: var(--accent); }
        .tracker-row.is-current.is-you::before { background: var(--green); }
        .tracker-row.is-next::before { background: var(--amber); }

        .tracker-radio {
            width: 18px; height: 18px; border-radius: 50%;
            border: 2px solid #3a3a5a; flex-shrink: 0;
            transition: all 0.3s; position: relative;
        }
        .tracker-row:hover .tracker-radio { border-color: #555; }
        .tracker-row.is-you .tracker-radio { border-color: #666; background: #666; }
        .tracker-row.is-you .tracker-radio::after {
            content: ''; position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 6px; height: 6px; border-radius: 50%; background: white;
        }

        .tracker-name {
            flex: 1; min-width: 0; background: transparent;
            border: none; border-bottom: 1.5px solid transparent;
            color: var(--text); font-size: 0.92em; font-weight: 500;
            padding: 4px 2px; outline: none; transition: all 0.3s;
        }
        .tracker-name:hover { border-bottom-color: #2a2a4a; }
        .tracker-name:focus { border-bottom-color: var(--accent); }
        .tracker-name::placeholder { color: #333; font-weight: 400; }
        .tracker-row.is-you .tracker-name { color: var(--text); }
        .tracker-row.is-current .tracker-name { color: #fff; font-weight: 600; }
        .tracker-row.is-current.is-you .tracker-name { color: #4ade80; }
        .tracker-row.is-next .tracker-name { color: var(--amber); }

        .row-link-btn {
            width: 22px; height: 22px; border-radius: 5px; flex-shrink: 0;
            background: transparent; border: 1px solid transparent;
            color: #2a2a4a; font-size: 0.8em; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            padding: 0; opacity: 0; transition: opacity 0.2s, color 0.2s, border-color 0.2s, background 0.2s;
            line-height: 1;
        }
        .tracker-row:hover .row-link-btn { opacity: 1; color: #444; border-color: #2a2a4a; }
        .row-link-btn:hover { background: rgba(255,255,255,0.06) !important; color: #888 !important; border-color: #3a3a5a !important; }
        .row-link-btn.did-copy { opacity: 1; color: var(--green) !important; border-color: rgba(34,197,94,0.3) !important; background: rgba(34,197,94,0.07) !important; }
        .row-link-btn:active { transform: scale(0.88); }

        .tracker-tag {
            font-size: 0.58em; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.6px; padding: 3px 8px; border-radius: 5px;
            white-space: nowrap; flex-shrink: 0;
        }
        .tracker-tag.waiting { color: #777; background: rgba(255,255,255,0.06); }
        .tracker-tag.turn { color: #052e16; background: var(--green); animation: pulse 1.4s ease infinite; }
        .tracker-tag.next { color: var(--amber); background: rgba(245,158,11,0.13); }

        .tracker-opp { display: flex; align-items: center; padding: 5px 20px; gap: 10px; transition: all 0.3s; }
        .tracker-opp-line { flex: 1; height: 1px; background: #1e1e32; transition: all 0.3s; }
        .tracker-opp-text { font-size: 0.6em; color: #262640; letter-spacing: 1px; font-weight: 600; white-space: nowrap; transition: color 0.3s; }
        .tracker-opp.is-current .tracker-opp-line { height: 2px; background: var(--accent); box-shadow: 0 0 10px rgba(233,69,96,0.25); }
        .tracker-opp.is-current .tracker-opp-text { color: var(--accent); font-weight: 700; }

        .tracker-status {
            text-align: center; margin-top: 18px; padding-top: 16px;
            border-top: 1px solid #1e1e32; font-size: 1.05em; font-weight: 600;
        }
        .tracker-status .num { font-size: 1.4em; font-weight: 800; }
        .tracker-status.now  { color: var(--green); }
        .tracker-status.soon { color: var(--amber); }
        .tracker-status.later { color: var(--muted); }
        .tracker-hint {
            text-align: center; margin-top: 16px; padding-top: 14px;
            border-top: 1px solid #1e1e32; font-size: 0.72em; color: #333; letter-spacing: 0.5px;
        }

        #results { width: 100%; max-width: 500px; }
        .game-link { color: var(--accent); text-decoration: none; font-size: 0.95em; white-space: nowrap; }
        .game-link:hover { opacity: 0.8; }
        .status-msg { text-align: center; padding: 28px; color: var(--muted); line-height: 1.6; }
        .status-msg.error { color: var(--accent); }

        .footer-row {
            display: flex; align-items: center; flex-wrap: wrap;
            justify-content: space-between;
            gap: 6px 14px; width: 100%; max-width: 500px; margin-top: 6px;
        }
        .footer-links { display: flex; align-items: center; flex-wrap: wrap; gap: 6px 14px; }
        .footer-meta { display: flex; align-items: center; gap: 10px; margin-left: auto; }
        .refresh-info { color: var(--muted); font-size: 0.75em; }
        .conn-badge {
            font-size: 0.7em; font-weight: 600; padding: 2px 8px;
            border-radius: 5px; display: inline-flex; align-items: center; gap: 5px;
        }
        .conn-badge.live { color: var(--green); background: rgba(34,197,94,0.1); }
        .conn-badge.poll { color: var(--muted); background: rgba(255,255,255,0.04); }
        .conn-dot {
            width: 6px; height: 6px; border-radius: 50%;
            display: inline-block;
        }
        .conn-badge.live .conn-dot { background: var(--green); animation: blink 1.5s infinite; }
        .conn-badge.poll .conn-dot { background: #666; animation: blink 2s infinite; }

        .api-error-bar {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            width: 100%; max-width: 500px; padding: 10px 18px; margin-bottom: 14px;
            border-radius: 10px; background: rgba(239,68,68,0.08);
            border: 1px solid rgba(239,68,68,0.25);
            color: var(--red); font-size: 0.8em; font-weight: 600;
        }
        .api-error-bar .err-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); flex-shrink: 0; animation: blink 1.2s infinite; }
        .api-error-bar .err-code { background: rgba(239,68,68,0.15); padding: 2px 7px; border-radius: 4px; font-family: 'Courier New', monospace; font-size: 0.9em; }
        .api-error-bar .err-time { color: #a44; font-weight: 400; font-size: 0.85em; margin-left: auto; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .alarm-btn {
            position: absolute; bottom: 14px; right: 14px;
            display: flex; align-items: center; gap: 7px;
            padding: 8px 16px; border-radius: 20px;
            background: rgba(255,255,255,0.04);
            border: 1.5px solid #3a3a5a;
            color: #666; font-size: 0.8em; font-weight: 600;
            cursor: pointer; user-select: none;
            transition: background 0.25s, border-color 0.25s, color 0.25s, box-shadow 0.25s;
        }
        .alarm-btn:hover {
            background: rgba(255,255,255,0.08);
            border-color: #555; color: var(--text);
        }
        .alarm-btn.is-on {
            background: rgba(245,158,11,0.12);
            border-color: var(--amber); color: var(--amber);
            box-shadow: 0 0 12px rgba(245,158,11,0.2);
        }
        .alarm-icon { font-size: 1.15em; line-height: 1; }
        .alarm-btn.is-on .alarm-icon { animation: ring 0.6s ease; }
        @keyframes ring {
            0% { transform: rotate(0); } 20% { transform: rotate(14deg); }
            40% { transform: rotate(-14deg); } 60% { transform: rotate(8deg); }
            80% { transform: rotate(-8deg); } 100% { transform: rotate(0); }
        }

        .share-row {
            display: flex; align-items: center; gap: 8px;
            width: 100%; max-width: 500px; margin-bottom: 18px;
        }
        .share-url-box {
            flex: 1; display: flex; align-items: center; gap: 0;
            background: var(--card); border: 1.5px solid #2a2a4a;
            border-radius: 10px; overflow: hidden; transition: border-color 0.3s;
        }
        .share-url-box:focus-within { border-color: #3a3a6a; }
        .share-url-input {
            flex: 1; padding: 10px 14px; background: transparent;
            border: none; color: #666; font-size: 0.72em;
            font-family: 'Courier New', monospace;
            outline: none; white-space: nowrap; overflow: hidden;
            text-overflow: ellipsis; cursor: default;
            user-select: all;
        }
        .copy-btn {
            padding: 10px 16px; background: rgba(255,255,255,0.04);
            border: none; border-left: 1.5px solid #2a2a4a;
            color: #666; font-size: 0.72em; font-weight: 700;
            cursor: pointer; letter-spacing: 0.5px;
            text-transform: uppercase; transition: all 0.2s;
            white-space: nowrap; border-radius: 0;
        }
        .copy-btn:hover { background: rgba(255,255,255,0.09); color: var(--text); }
        .copy-btn.copied { color: var(--green); background: rgba(34,197,94,0.08); }
        .copy-btn:active { transform: none; }

        .toast {
            position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(16px);
            background: #1e2e1e; border: 1px solid rgba(34,197,94,0.3);
            color: var(--green); font-size: 0.8em; font-weight: 600;
            padding: 10px 20px; border-radius: 10px; pointer-events: none;
            opacity: 0; transition: opacity 0.2s, transform 0.2s;
            z-index: 200; white-space: nowrap;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        .debug-toggle {
            position: fixed; bottom: 10px; right: 10px;
            width: 28px; height: 28px; border-radius: 6px;
            background: rgba(255,255,255,0.04); border: 1px solid #1e1e32;
            color: #333; font-size: 0.7em; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            z-index: 100; transition: all 0.2s;
        }
        .debug-toggle:hover { color: #666; border-color: #333; }
        .debug-panel {
            display: none;
            position: fixed; bottom: 46px; right: 10px;
            width: 420px; max-width: calc(100vw - 20px);
            max-height: 50vh;
            background: #0a0a16; border: 1px solid #1a1a2e;
            border-radius: 10px; overflow: hidden;
            z-index: 100; font-family: 'Courier New', monospace;
            font-size: 0.7em;
        }
        .debug-panel.open { display: flex; flex-direction: column; }
        .debug-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 12px; background: #0e0e1e; border-bottom: 1px solid #1a1a2e;
            color: #555; font-size: 0.9em; font-weight: 700;
        }
        .debug-clear {
            background: none; border: 1px solid #222; border-radius: 4px;
            color: #444; padding: 2px 8px; font-size: 0.85em; cursor: pointer;
        }
        .debug-clear:hover { color: #888; border-color: #444; }
        .debug-count {
            color: #333; font-size: 0.8em; font-weight: 400; margin-right: auto; margin-left: 6px;
        }
        .debug-paused-pill {
            display: none; align-items: center; gap: 4px;
            font-size: 0.78em; font-weight: 700; color: var(--amber);
            background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.25);
            border-radius: 4px; padding: 1px 7px; cursor: pointer;
            user-select: none; transition: background 0.2s;
        }
        .debug-paused-pill:hover { background: rgba(245,158,11,0.2); }
        .debug-panel.is-paused .debug-paused-pill { display: inline-flex; }
        .debug-log {
            flex: 1; overflow-y: auto; padding: 8px 12px;
            scroll-behavior: auto; /* instant jump when we programmatically scroll */
        }
        .debug-entry {
            padding: 3px 0; border-bottom: 1px solid #0e0e1a;
            line-height: 1.4; word-break: break-all;
        }
        .debug-entry .dt { color: #333; }
        .debug-entry.log-info { color: #5588aa; }
        .debug-entry.log-ok   { color: #4a9; }
        .debug-entry.log-warn { color: #a85; }
        .debug-entry.log-err  { color: #c55; }
        .debug-entry.log-ws   { color: #88c; }
        .debug-entry.log-evt  { color: #a8d; }

        /* ── Clock Blame ── */
        .blame-card {
            width: 100%; max-width: 500px;
            background: var(--card); border: 2px solid #2a2a4a;
            border-radius: 18px; padding: 24px 22px;
            margin-bottom: 20px;
        }
        .blame-header {
            display: flex; justify-content: space-between; align-items: baseline;
            margin-bottom: 4px;
        }
        .blame-title {
            font-size: 0.7em; text-transform: uppercase;
            letter-spacing: 2.5px; color: var(--muted); font-weight: 700;
        }
        .blame-game-link {
            font-size: 0.7em; color: var(--accent); text-decoration: none; opacity: 0.7;
        }
        .blame-game-link:hover { opacity: 1; }
        .blame-meta {
            font-size: 0.68em; color: #3a3a5a; margin-bottom: 18px; letter-spacing: 0.5px;
        }
        .blame-rows { display: flex; flex-direction: column; gap: 10px; }
        .blame-row {
            padding: 13px 16px; border-radius: 12px;
            background: rgba(255,255,255,0.02);
            border: 1.5px solid transparent;
        }
        .blame-row.is-me {
            border-color: rgba(255,255,255,0.07);
            background: rgba(255,255,255,0.03);
        }
        .blame-row-top {
            display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
        }
        .blame-name {
            flex: 1; font-weight: 600; font-size: 0.92em; color: var(--text);
        }
        .blame-row.is-me .blame-name { color: #4ade80; }
        .blame-moves {
            font-size: 0.72em; color: #3a3a5a; white-space: nowrap;
        }
        .blame-stats { display: flex; gap: 10px; }
        .blame-stat-block { flex: 1; }
        .blame-stat-label {
            font-size: 0.6em; text-transform: uppercase; letter-spacing: 1px;
            color: #3a3a5a; font-weight: 700; margin-bottom: 4px;
        }
        .blame-stat-value {
            font-size: 0.82em; font-weight: 600; color: var(--muted); margin-bottom: 5px;
        }
        .blame-stat-value.highlight { color: var(--amber); }
        .blame-bar-track {
            height: 4px; border-radius: 2px; background: rgba(255,255,255,0.05); overflow: hidden;
        }
        .blame-bar-fill {
            height: 100%; border-radius: 2px;
            background: #2a4a3a; transition: width 0.6s ease;
        }
        .blame-bar-fill.warn { background: var(--amber); }
        .blame-pips { display: flex; gap: 3px; margin-top: 5px; }
        .blame-pip {
            flex: 1; height: 4px; border-radius: 2px;
            background: rgba(255,255,255,0.05);
        }
        .blame-pip.used { background: var(--amber); }
        .blame-pip.free { background: #22553a; }
        .blame-computing {
            text-align: center; padding: 22px; color: #333;
            font-size: 0.8em; letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <h1>⚫⚪ OGS Tandem Tracker</h1>
    <p class="subtitle">Keep track of whose turn it is!</p>

    <div class="search-box">
        <input type="text" id="username" placeholder="Enter OGS username…" autocomplete="off">
    </div>

    <div id="apiError"></div>
    <div class="tracker-wrap">
        <div id="tracker" class="tracker"></div>
        <button class="alarm-btn" id="alarmToggle" onclick="toggleAlarm()" title="Toggle turn alarm">
            <span class="alarm-icon">🔔</span>
            <span id="alarmLabel">Alarm</span>
        </button>
    </div>
    <div id="blame"></div>
    <div id="results"></div>

    <div class="toast" id="toast">✔ Link copied!</div>

    <div class="debug-toggle" onclick="toggleDebug()">🐛</div>
    <div class="debug-panel" id="debugPanel">
        <div class="debug-header">
            <span>Debug Log</span>
            <span class="debug-count" id="debugCount"></span>
            <span class="debug-paused-pill" id="debugPausedPill" onclick="debugJumpToBottom()">⏸ paused — click to resume ↓</span>
            <button class="debug-clear" onclick="clearDebug()">clear</button>
        </div>
        <div class="debug-log" id="debugLog"></div>
    </div>

<script>
/* ── Debug ──────────────────────────────────────── */
var debugEntries = [];
var debugPaused = false;

function dbg(msg, level) {
    level = level || 'info';
    var t = new Date().toLocaleTimeString('en-GB', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit', fractionalSecondDigits: 3 });
    debugEntries.push({ t: t, msg: msg, level: level });
    if (debugEntries.length > 300) {
        debugEntries.shift();
        var el = document.getElementById('debugLog');
        if (el && el.firstChild) el.removeChild(el.firstChild);
    }
    var el = document.getElementById('debugLog');
    if (!el) return;
    var div = document.createElement('div');
    div.className = 'debug-entry log-' + level;
    div.innerHTML = '<span class="dt">' + t + '</span> ' + esc(String(msg));
    el.appendChild(div);
    if (!debugPaused) el.scrollTop = el.scrollHeight;
    var cnt = document.getElementById('debugCount');
    if (cnt) cnt.textContent = debugEntries.length + ' lines';
}

function debugSetPaused(p) {
    debugPaused = p;
    var panel = document.getElementById('debugPanel');
    if (panel) panel.classList.toggle('is-paused', p);
}

function debugJumpToBottom() {
    var el = document.getElementById('debugLog');
    if (el) el.scrollTop = el.scrollHeight;
    debugSetPaused(false);
}

function toggleDebug() {
    var panel = document.getElementById('debugPanel');
    panel.classList.toggle('open');
    if (panel.classList.contains('open')) debugJumpToBottom();
}

function clearDebug() {
    debugEntries.length = 0;
    var el = document.getElementById('debugLog');
    if (el) el.innerHTML = '';
    var cnt = document.getElementById('debugCount');
    if (cnt) cnt.textContent = '';
    debugSetPaused(false);
}

document.addEventListener('DOMContentLoaded', function () {
    var el = document.getElementById('debugLog');
    if (!el) return;
    el.addEventListener('scroll', function () {
        var atBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 8;
        if (atBottom && debugPaused) debugSetPaused(false);
        else if (!atBottom && !debugPaused) debugSetPaused(true);
    });
});

var API = 'https://online-go.com/api/v1';

var playerId = null, playerName = '';
var cachedStates = {}, cachedActiveGames = [];
var lastEntries = [], teamNames = ['', ''];
var numPlayers = 2, myPlayerIndex = 0, lastApiError = null;
var prevMoves = {};

/* ── Alarm state (declared early so loadSettings can set them before IIFE runs) ── */
var alarmOn = false, alarmPlaying = false, alarmTimeout = null;
var audioCtx = null, wasMyTurn = false;

/* ── LocalStorage persistence ───────────────────── */
var STORAGE_KEY = 'ogs-tandem-settings';

function saveSettings() {
    try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
            numPlayers: numPlayers,
            myPlayerIndex: myPlayerIndex,
            teamNames: teamNames,
            username: document.getElementById('username') ? document.getElementById('username').value.trim() : '',
            alarmOn: alarmOn
        }));
    } catch(e) { /* storage unavailable */ }
}

function loadSettings() {
    try {
        var raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        var s = JSON.parse(raw);
        if (typeof s.numPlayers === 'number' && s.numPlayers >= 1 && s.numPlayers <= 20)
            numPlayers = s.numPlayers;
        if (typeof s.myPlayerIndex === 'number' && s.myPlayerIndex >= 0 && s.myPlayerIndex < numPlayers)
            myPlayerIndex = s.myPlayerIndex;
        if (Array.isArray(s.teamNames)) {
            teamNames = s.teamNames.slice();
            while (teamNames.length < numPlayers) teamNames.push('');
        }
        if (s.username) {
            // Only set if URL didn't already specify one
            var el = document.getElementById('username');
            if (el && !el.value.trim()) el.value = s.username;
        }
        if (s.alarmOn) {
            alarmOn = true;
            var t = document.getElementById('alarmToggle');
            if (t) t.classList.add('is-on');
            var l = document.getElementById('alarmLabel');
            if (l) l.textContent = 'Alarm on';
        }
    } catch(e) { /* ignore corrupt data */ }
}

/* ── URL Params ─────────────────────────────────── */
(function initFromURL() {
    var p = new URLSearchParams(window.location.search);
    var n = parseInt(p.get('n'));
    if (n >= 1 && n <= 20) numPlayers = n;
    var me = parseInt(p.get('me'));
    if (!isNaN(me) && me >= 0 && me < numPlayers) myPlayerIndex = me;
    var names = p.get('names');
    if (names) {
        var parts = names.split(',').map(function(s) { return decodeURIComponent(s); });
        while (teamNames.length < numPlayers) teamNames.push('');
        for (var i = 0; i < parts.length && i < numPlayers; i++) teamNames[i] = parts[i];
    }
    // Load persisted settings (URL params take priority over stored values)
    loadSettings();
    // URL params override stored values if explicitly present
    if (n >= 1 && n <= 20) numPlayers = n;
    if (!isNaN(me) && me >= 0 && me < numPlayers) myPlayerIndex = me;
    if (names) {
        var parts2 = names.split(',').map(function(s) { return decodeURIComponent(s); });
        while (teamNames.length < numPlayers) teamNames.push('');
        for (var i2 = 0; i2 < parts2.length && i2 < numPlayers; i2++) teamNames[i2] = parts2[i2];
    }
    var user = p.get('user');
    if (user) {
        document.getElementById('username').value = user;
        setTimeout(function() { search(); }, 100);
    } else {
        // Auto-search if we have a stored username
        var stored = document.getElementById('username').value.trim();
        if (stored) setTimeout(function() { search(); }, 100);
    }
})();

function syncURL() {
    var p = new URLSearchParams();
    var uv = document.getElementById('username').value.trim();
    if (uv) p.set('user', uv);
    if (numPlayers !== 2) p.set('n', numPlayers);
    if (myPlayerIndex !== 0) p.set('me', myPlayerIndex);
    var nonEmpty = teamNames.slice(0, numPlayers).some(function(n) { return n.trim(); });
    if (nonEmpty) p.set('names', teamNames.slice(0, numPlayers).map(function(n) { return encodeURIComponent(n || ''); }).join(','));
    var base = window.location.pathname;
    var qs = p.toString();
    history.replaceState(null, '', qs ? base + '?' + qs : base);
}

/* ── Socket.io ──────────────────────────────────── */
// Socket.io handles: protocol framing, heartbeat/ping-pong, and
// reconnection with exponential backoff — all automatically.

var socket = null;
var wsConnected = false;
var subscribedGames = {};

function wsConnect() {
    if (socket) {
        dbg('wsConnect: disconnecting existing socket', 'ws');
        socket.disconnect();
        socket = null;
    }

    dbg('wsConnect: connecting via Socket.io', 'ws');

    socket = io('https://online-go.com', {
        transports: ['websocket'],
        reconnection: true,
        reconnectionDelay: 1000,
        reconnectionDelayMax: 10000,
        reconnectionAttempts: Infinity
    });

    socket.on('connect', function () {
        dbg('WS: connected ✓ sid=' + socket.id, 'ok');
        wsConnected = true;
        clearApiError();

        socket.emit('authenticate', { device_id: 'tracker-' + Date.now() });
        socket.emit('notification/connect', { player_id: 0 });

        var gids = Object.keys(subscribedGames);
        if (gids.length) {
            dbg('WS: re-subscribing to ' + gids.length + ' game(s)', 'ws');
            gids.forEach(function (gid) {
                socket.emit('game/connect', { game_id: parseInt(gid) });
            });
        }

        updateConnectionUI();
    });

    socket.on('disconnect', function (reason) {
        dbg('WS: disconnected (' + reason + ')', 'warn');
        wsConnected = false;
        updateConnectionUI();
    });

    socket.on('connect_error', function (err) {
        dbg('WS: connect_error: ' + err.message, 'err');
    });

    socket.onAny(function (event, data) {
        if (event === 'net/pong') return;
        dbg('WS RX: ' + event + ' ' + JSON.stringify(data).substring(0, 200), 'evt');
        if (typeof event === 'string' && event.indexOf('game/') === 0) {
            handleGameEvent(event, data);
        }
    });
}

function wsSubscribeGame(gameId) {
    if (subscribedGames[gameId]) return;
    subscribedGames[gameId] = true;
    dbg('wsSubscribeGame(' + gameId + ')', 'ws');
    if (wsConnected && socket) {
        socket.emit('game/connect', { game_id: gameId });
    }
}

function wsUnsubscribeAll() {
    var gids = Object.keys(subscribedGames);
    if (gids.length && socket && socket.connected) {
        dbg('wsUnsubscribeAll: ' + gids.length + ' game(s)', 'ws');
        gids.forEach(function (gid) {
            socket.emit('game/disconnect', { game_id: parseInt(gid) });
        });
    }
    subscribedGames = {};
}

function wsDisconnect() {
    wsUnsubscribeAll();
    if (socket) {
        socket.disconnect();
        socket = null;
    }
    wsConnected = false;
}

function handleGameEvent(event, data) {
    // event format: "game/{id}/{type}"
    var parts = event.split('/');
    if (parts.length < 3) return;
    var gid = parseInt(parts[1]);
    var type = parts.slice(2).join('/');

    if (type === 'gamedata') {
        var mn = 0;
        if (typeof data.move_number === 'number') mn = data.move_number;
        else if (Array.isArray(data.moves)) mn = data.moves.length;
        dbg('WS gamedata gid=' + gid + ' move=' + mn + ' phase=' + (data.phase || '?') + ' handicap=' + (data.handicap || 0), 'ok');
        var patch = { move_number: mn };
        if (typeof data.handicap === 'number') patch.handicap = data.handicap;
        cachedStates[gid] = Object.assign({}, cachedStates[gid] || {}, patch);
        if (data.phase === 'finished') {
            dbg('WS: game ' + gid + ' finished (via gamedata), triggering gameOver', 'warn');
            gameOver();
        } else {
            renderFromCache();
        }
    } else if (type === 'move') {
        var prev = cachedStates[gid] ? (cachedStates[gid].move_number || 0) : 0;
        var mn2 = (typeof data.move_number === 'number') ? data.move_number : prev + 1;
        dbg('WS move gid=' + gid + ' move=' + mn2 + ' (was ' + prev + ')', 'ok');
        cachedStates[gid] = Object.assign({}, cachedStates[gid] || {}, { move_number: mn2 });
        renderFromCache();
    } else if (type === 'undo_requested') {
        dbg('WS undo_requested gid=' + gid + ' move=' + (data.move_number || '?'), 'warn');
    } else if (type === 'undo_accepted') {
        var undoMove = typeof data.move_number === 'number' ? data.move_number : null;
        if (undoMove !== null) {
            dbg('WS undo_accepted gid=' + gid + ' reverting to move=' + undoMove, 'ok');
            cachedStates[gid] = Object.assign({}, cachedStates[gid] || {}, { move_number: undoMove });
            wasMyTurn = false; // force alarm re-trigger if it's now our turn
            renderFromCache();
        }
    } else if (type === 'clock') {
        dbg('WS clock gid=' + gid, 'evt');
    } else if (type === 'phase') {
        var phase = (typeof data === 'string') ? data : (data && data.phase) ? data.phase : '';
        dbg('WS phase gid=' + gid + ' phase=' + (phase || '?'), 'warn');
        if (phase === 'finished') {
            dbg('WS: game ' + gid + ' finished (phase event), triggering gameOver', 'warn');
            gameOver();
        }
        // 'stone removal' etc. are intermediate — ignore, game isn't over yet
    } else {
        dbg('WS game event: ' + type + ' gid=' + gid, 'evt');
    }
}

function renderFromCache() {
    if (!cachedActiveGames.length) return;
    lastEntries = cachedActiveGames.slice(0, 5).map(function (g) {
        return { game: g, state: cachedStates[g.id] || null, cached: true };
    });
    render(lastEntries);
}

function updateConnectionUI() {
    if (lastEntries.length) render(lastEntries);
}

/* ── REST Polling (fallback / heartbeat) ────────── */
var stateTimer = null;
var BASE_INTERVAL = 5000;
var MAX_INTERVAL = 10000;
var currentInterval = BASE_INTERVAL;
var consecutiveErrors = 0;
var polling = false;

function getBackoffInterval() {
    return consecutiveErrors > 0 ? MAX_INTERVAL : BASE_INTERVAL;
}

function startPolling() {
    stopPolling();
    polling = true;
    currentInterval = getBackoffInterval();
    var interval = wsConnected ? 30000 : currentInterval;
    dbg('startPolling: every ' + interval + 'ms (ws=' + wsConnected + ')', 'ok');
    stateTimer = setInterval(function () { pollStates(); }, interval);
}

function restartPolling() {
    if (!polling) return;
    clearInterval(stateTimer);
    currentInterval = getBackoffInterval();
    var interval = wsConnected ? 30000 : currentInterval;
    dbg('restartPolling: interval now ' + interval + 'ms', 'info');
    stateTimer = setInterval(function () { pollStates(); }, interval);
}

function stopPolling() {
    polling = false;
    clearInterval(stateTimer); stateTimer = null;
}

async function pollStates() {
    var games = cachedActiveGames;

    if (!games.length || !playerId) {
        await refreshGameList();
        games = cachedActiveGames;
        if (!games.length) return;
    }

    if (wsConnected) {
        var allCached = games.slice(0, 5).every(function (g) { return !!cachedStates[g.id]; });
        if (allCached) {
            dbg('pollStates: WS live + all cached, skipping REST', 'info');
            renderFromCache();
            return;
        }
    }

    var hadError = false;
    var entries = await Promise.all(games.slice(0, 5).map(async function (g) {
        try {
            var state = await api('/games/' + g.id + '/state/');
            cachedStates[g.id] = state;
            return { game: g, state: state, cached: false };
        } catch (err) {
            hadError = true;
            dbg('pollStates: error gid=' + g.id + ' → ' + (err.apiStatus || '?') + ' ' + err.message, 'err');
            setApiError(err.apiStatus || 0, err.message);
            var fb = cachedStates[g.id] || null;
            return { game: g, state: fb, cached: !!fb };
        }
    }));

    if (hadError) {
        consecutiveErrors++;
        restartPolling();
    } else {
        if (consecutiveErrors > 0) { consecutiveErrors = 0; restartPolling(); }
        clearApiError();
    }

    lastEntries = entries;
    render(entries);
}

async function refreshGameList() {
    if (!playerId) return;
    dbg('refreshGameList…', 'info');
    try {
        var full = await api('/players/' + playerId + '/full/');
        cachedActiveGames = full.active_games || [];
        dbg('refreshGameList: ' + cachedActiveGames.length + ' games', 'ok');
        if (!cachedActiveGames.length) {
            gameOver();
        }
    } catch (err) {
        dbg('refreshGameList failed: ' + err.message, 'err');
    }
}

/* ── Clock Blame ────────────────────────────────── */
function showBlameComputing() {
    document.getElementById('blame').innerHTML = '<div class="blame-computing">⏱ Computing clock blame…</div>';
}
function clearBlame() {
    document.getElementById('blame').innerHTML = '';
}

function fmtSec(s) {
    s = Math.max(0, Math.round(s));
    if (s < 60) return s + 's';
    var m = Math.floor(s / 60), r = s % 60;
    if (m < 60) return m + 'm' + (r ? ' ' + r + 's' : '');
    var h = Math.floor(m / 60); m = m % 60;
    return h + 'h' + (m ? ' ' + m + 'm' : '');
}

async function computeClockBlame(game) {
    try {
        dbg('clockBlame: fetching gid=' + game.id, 'info');
        var r = await api('/games/' + game.id + '/');

        // Parse time control
        var tcp = r.time_control_parameters;
        if (typeof tcp === 'string') { try { tcp = JSON.parse(tcp); } catch(e2) { tcp = {}; } }
        tcp = tcp || {};
        dbg('clockBlame gid=' + game.id + ' raw tcp: ' + JSON.stringify(tcp).substring(0, 300), 'info');
        var system        = tcp.system || tcp.time_control || 'byoyomi';
        var mainTime      = typeof tcp.initial_time   === 'number' ? tcp.initial_time
                          : typeof tcp.main_time      === 'number' ? tcp.main_time : 0;
        var periodTime    = typeof tcp.period_time    === 'number' ? tcp.period_time  : 30;
        var numPer        = typeof tcp.periods        === 'number' ? tcp.periods      : 5;
        var timeIncrement = typeof tcp.time_increment === 'number' ? tcp.time_increment : 0;
        var maxTime       = typeof tcp.max_time       === 'number' ? tcp.max_time : Infinity;
        var isByoyomi     = (system === 'byoyomi');
        var isFischer     = (system === 'fischer');

        // Moves from gamedata: each entry is [x, y, timedelta_ms]
        var gd    = r.gamedata || {};
        var moves = gd.moves   || [];
        dbg('clockBlame gid=' + game.id + ': system=' + system + ' mainTime=' + mainTime +
            ' increment=' + timeIncrement + ' periodTime=' + periodTime +
            ' periods=' + numPer + ' moves=' + moves.length, 'info');

        // Log a few raw timedeltas so we can verify units
        if (moves.length) {
            var sample = moves.slice(0, Math.min(4, moves.length)).map(function(m) {
                return '[' + (m[0]) + ',' + (m[1]) + ',' + (m[2]) + ']';
            });
            dbg('clockBlame gid=' + game.id + ' sample moves: ' + sample.join(' '), 'info');
        }

        var color = getColor(game);
        if (!color) {
            dbg('clockBlame: cannot determine color for gid=' + game.id, 'warn');
            return null;
        }
        var N = numPlayers;

        // Per-player state
        var stats = [];
        for (var i = 0; i < N; i++) {
            stats.push({
                name:          teamNames[i] || ('Player ' + i),
                moveCount:     0,
                mainUsed:      0,   // net seconds consumed (after increments for Fischer)
                periodsUsed:   0,
                incrementEarned: 0, // total increment bonus accumulated (Fischer only)
                // runtime clock simulation
                mainLeft:      mainTime,
                periodsLeft:   numPer,
                inByoyomi:     mainTime === 0
            });
        }

        // OGS timedeltas are in milliseconds — convert to seconds.
        var tdScale = 0.001;

        for (var mi = 0; mi < moves.length; mi++) {
            var mv = moves[mi];
            var td = (mv && mv[2] != null) ? Math.min(Number(mv[2]) * tdScale, mainTime + numPer * periodTime + 60) : 0;
            if (td < 0) td = 0;

            // Is this move ours?
            var isBlack  = (mi % 2 === 0);
            var isOurs   = (color === 'black') ? isBlack : !isBlack;
            if (!isOurs) continue;

            // Which player on our team?
            var ourSeq = Math.floor(mi / 2);
            var pi     = ourSeq % N;
            var ps     = stats[pi];
            ps.moveCount++;

            if (isByoyomi) {
                if (!ps.inByoyomi) {
                    if (td <= ps.mainLeft) {
                        ps.mainUsed += td;
                        ps.mainLeft -= td;
                        if (ps.mainLeft < 0.01) ps.inByoyomi = true;
                    } else {
                        // Transition into byoyomi this move
                        ps.mainUsed += ps.mainLeft;
                        var byoPart   = td - ps.mainLeft;
                        ps.mainLeft   = 0;
                        ps.inByoyomi  = true;
                        if (byoPart >= periodTime * 0.98) {
                            ps.periodsUsed++;
                            ps.periodsLeft = Math.max(0, ps.periodsLeft - 1);
                        }
                    }
                } else {
                    // Already in byoyomi: period consumed only if ≥ period_time
                    if (td >= periodTime * 0.98) {
                        ps.periodsUsed++;
                        ps.periodsLeft = Math.max(0, ps.periodsLeft - 1);
                    }
                }
            } else if (isFischer) {
                // Real time spent thinking on this move
                ps.mainUsed += td;
                // Each move earns an increment toward the total budget
                ps.incrementEarned += timeIncrement;
            } else {
                // Simple / absolute: just accumulate
                ps.mainUsed += td;
                ps.mainLeft  = Math.max(0, ps.mainLeft - td);
            }
        }

        dbg('clockBlame gid=' + game.id + ' done: ' +
            stats.map(function(s) { return s.name + '=' + Math.round(s.mainUsed) + 's/' + s.periodsUsed + 'p'; }).join(', '), 'ok');

        return {
            gameId: game.id, color: color,
            system: system, mainTime: mainTime, periodTime: periodTime, numPer: numPer,
            timeIncrement: timeIncrement,
            stats: stats
        };
    } catch(e) {
        dbg('computeClockBlame gid=' + game.id + ': ' + e.message, 'err');
        return null;
    }
}

function renderClockBlame(blameList) {
    var el = document.getElementById('blame');
    if (!blameList || !blameList.length) { el.innerHTML = ''; return; }

    var html = '';
    blameList.forEach(function(b) {
        if (!b) return;
        var isByo    = b.system === 'byoyomi';
        var isFisch  = b.system === 'fischer';
        var colorLbl = b.color === 'black' ? '⚫ Black' : '⚪ White';
        var metaParts = [colorLbl + ' team', b.system];
        if (b.mainTime) metaParts.push(fmtSec(b.mainTime) + ' main');
        if (isFisch && b.timeIncrement) metaParts.push('+' + fmtSec(b.timeIncrement) + '/move');
        if (isByo) metaParts.push(b.numPer + ' × ' + fmtSec(b.periodTime) + ' byoyomi');

        html += '<div class="blame-card">';
        html += '<div class="blame-header">'
              + '<span class="blame-title">⏱ Clock Blame</span>'
              + '<a class="blame-game-link" href="https://online-go.com/game/' + b.gameId + '" target="_blank" rel="noopener">Game #' + b.gameId + ' ↗</a>'
              + '</div>';
        html += '<div class="blame-meta">' + metaParts.join(' · ') + '</div>';
        html += '<div class="blame-rows">';

        b.stats.forEach(function(ps, i) {
            var isMe       = (i === myPlayerIndex);
            var totalAvail = isFisch ? (b.mainTime + ps.incrementEarned) : b.mainTime;
            var mainPct    = totalAvail > 0 ? Math.min(100, (ps.mainUsed / totalAvail) * 100) : 0;
            var mainWarn   = mainPct > 75;

            html += '<div class="blame-row' + (isMe ? ' is-me' : '') + '">';
            html += '<div class="blame-row-top">'
                  + '<span class="blame-name">' + esc(ps.name) + '</span>'
                  + '<span class="blame-moves">' + ps.moveCount + ' move' + (ps.moveCount !== 1 ? 's' : '') + '</span>'
                  + '</div>';
            html += '<div class="blame-stats">';

            // Main time block
            if (b.mainTime > 0) {
                html += '<div class="blame-stat-block">'
                      + '<div class="blame-stat-label">' + (isFisch ? 'Fischer time' : 'Main time') + '</div>'
                      + '<div class="blame-stat-value' + (mainWarn ? ' highlight' : '') + '">'
                      + fmtSec(ps.mainUsed) + ' / ' + fmtSec(totalAvail)
                      + '</div>'
                      + '<div class="blame-bar-track"><div class="blame-bar-fill' + (mainWarn ? ' warn' : '') + '" style="width:' + mainPct.toFixed(1) + '%"></div></div>'
                      + '</div>';
            }

            // Byoyomi block
            if (isByo) {
                var pipsHtml = '';
                for (var p = 0; p < b.numPer; p++) {
                    var cls = p < ps.periodsUsed ? 'used' : 'free';
                    pipsHtml += '<div class="blame-pip ' + cls + '"></div>';
                }
                html += '<div class="blame-stat-block">'
                      + '<div class="blame-stat-label">Byoyomi</div>'
                      + '<div class="blame-stat-value' + (ps.periodsUsed > 0 ? ' highlight' : '') + '">'
                      + ps.periodsUsed + ' / ' + b.numPer + ' period' + (b.numPer !== 1 ? 's' : '')
                      + '</div>'
                      + '<div class="blame-pips">' + pipsHtml + '</div>'
                      + '</div>';
            }

            html += '</div>'; // blame-stats
            html += '</div>'; // blame-row
        });

        html += '</div></div>'; // blame-rows, blame-card
    });

    el.innerHTML = html;
}

/* ── Alarm ──────────────────────────────────────── */
function toggleAlarm() {
    alarmOn = !alarmOn;
    document.getElementById('alarmToggle').classList.toggle('is-on', alarmOn);
    document.getElementById('alarmLabel').textContent = alarmOn ? 'Alarm on' : 'Alarm';
    if (!alarmOn) stopAlarm();
    if (alarmOn && !audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    saveSettings();
}
function playBeep(f, d, v) {
    if (!audioCtx) return;
    var o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = 'square'; o.frequency.value = f;
    g.gain.setValueAtTime(v, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + d);
    o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + d);
}
function playAlarmBurst() {
    playBeep(880, 0.12, 0.15);
    setTimeout(function () { playBeep(1100, 0.12, 0.15); }, 140);
    setTimeout(function () { playBeep(880, 0.12, 0.15); }, 280);
}
function startAlarm() {
    if (alarmPlaying) return;
    alarmPlaying = true;
    document.body.classList.add('alarm-active');
    playAlarmBurst();
    clearTimeout(alarmTimeout);
    alarmTimeout = setTimeout(function () { stopAlarm(); }, 2000);
}
function stopAlarm() {
    alarmPlaying = false;
    document.body.classList.remove('alarm-active');
    clearTimeout(alarmTimeout);
    alarmTimeout = null;
}
function updateAlarm(t) {
    if (alarmOn && t && !wasMyTurn) startAlarm();
    else if (!t || !alarmOn) stopAlarm();
    wasMyTurn = t;
}

/* ── API error ──────────────────────────────────── */
function setApiError(s, m) { lastApiError = { status: s, message: m, time: new Date() }; renderApiError(); }
function clearApiError() { lastApiError = null; renderApiError(); }
function renderApiError() {
    var el = document.getElementById('apiError');
    if (!lastApiError) { el.innerHTML = ''; return; }
    var status = lastApiError.status, time = lastApiError.time;
    var l = status === 429 ? 'Rate limited — slowing down…' : 'API error — using cached data';
    el.innerHTML = '<div class="api-error-bar"><span class="err-dot"></span><span>' + l + '</span><span class="err-code">' + status + '</span><span class="err-time">' + time.toLocaleTimeString('en-GB') + '</span></div>';
}

/* ── Tracker UI ─────────────────────────────────── */
function selectPlayer(i) { myPlayerIndex = i; if (lastEntries.length) render(lastEntries); else renderTracker(); syncURL(); saveSettings(); }
function changeCount(d) {
    numPlayers = Math.max(1, Math.min(20, numPlayers + d));
    if (myPlayerIndex >= numPlayers) myPlayerIndex = numPlayers - 1;
    while (teamNames.length < numPlayers) teamNames.push('');
    teamNames.length = numPlayers;
    if (lastEntries.length) render(lastEntries); else renderTracker();
    syncURL(); saveSettings();
}
function onNameInput(el) { teamNames[parseInt(el.dataset.tindex)] = el.value; syncURL(); saveSettings(); }

function buildPlayerLink(playerIndex) {
    var p = new URLSearchParams();
    var uv = document.getElementById('username').value.trim();
    if (uv) p.set('user', uv);
    if (numPlayers !== 2) p.set('n', numPlayers);
    p.set('me', playerIndex);
    var nonEmpty = teamNames.slice(0, numPlayers).some(function(n) { return n.trim(); });
    if (nonEmpty) p.set('names', teamNames.slice(0, numPlayers).map(function(n) { return encodeURIComponent(n || ''); }).join(','));
    return window.location.origin + window.location.pathname + '?' + p.toString();
}

var rowCopyTimers = {};
function copyPlayerLink(playerIndex, btn) {
    var url = buildPlayerLink(playerIndex);
    navigator.clipboard.writeText(url).then(function() {
        btn.classList.add('did-copy');
        btn.innerHTML = '✔';
        clearTimeout(rowCopyTimers[playerIndex]);
        rowCopyTimers[playerIndex] = setTimeout(function() {
            btn.classList.remove('did-copy');
            btn.innerHTML = linkIcon;
        }, 1800);
    }).catch(function() {
        var ta = document.createElement('textarea');
        ta.value = url; document.body.appendChild(ta); ta.select();
        document.execCommand('copy'); document.body.removeChild(ta);
    });
}
var linkIcon = '<svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 9.5a4 4 0 0 0 5.657 0l2-2a4 4 0 0 0-5.657-5.657L7.086 3.257"/><path d="M9.5 6.5a4 4 0 0 0-5.657 0l-2 2a4 4 0 0 0 5.657 5.657L8.914 12.743"/></svg>';

function renderTracker() {
    var N = numPlayers, P = myPlayerIndex, c = document.getElementById('tracker');
    var Z = null, color = null, handicap = 0;
    if (lastEntries.length) {
        var first = lastEntries[0];
        Z = first.state ? (first.state.move_number != null ? first.state.move_number : null) : null;
        color = getColor(first.game);
        handicap = first.state && first.state.handicap ? first.state.handicap : 0;
    }
    var hasGame = (typeof Z === 'number' && color !== null);
    var totalSlots = 2 * N;
    var turnInfo = null;
    if (hasGame) turnInfo = getTurnInfo(Z, N, P, color, handicap);
    var ae = document.activeElement, fi = ae ? ae.dataset.tindex : undefined, cp = ae ? ae.selectionStart : undefined;
    var cls = 'tracker';
    if (turnInfo && turnInfo.myTurn) cls += ' state-now';
    else if (turnInfo && turnInfo.imNext) cls += ' state-soon';
    c.className = cls;

    var h = '<div class="tracker-header"><span class="tracker-title">' + (hasGame ? 'Turn Order' : 'Your Team') + '</span><div class="tracker-stepper"><button class="step-btn" onclick="changeCount(-1)">−</button><span class="step-count">' + N + '</span><button class="step-btn" onclick="changeCount(1)">+</button></div></div>';
    if (hasGame) {
        var tl = color === 'black' ? '⚫ Black team' : '⚪ White team';
        h += '<div class="tracker-team-info">' + tl + '</div>';
    }
    h += '<div class="tracker-slots">';
    if (hasGame) {
        for (var i = 0; i < totalSlots; i++) {
            var isB = (i % 2 === 0) !== (handicap >= 2), ti = Math.floor(i / 2), isMyT = color === 'black' ? isB : !isB;
            var isCurr = i === turnInfo.currentSlot, isMine = i === turnInfo.playerSlot;
            var isNext = isMine && turnInfo.dist === 1 && !isCurr;
            if (isMyT) {
                var rc = 'tracker-row';
                if (isMine) rc += ' is-you'; if (isCurr) rc += ' is-current'; if (isNext) rc += ' is-next';
                var nm = teamNames[ti] || '', tag = '';
                if (isCurr && isMine) tag = '<span class="tracker-tag turn">YOUR TURN</span>';
                else if (isNext) tag = '<span class="tracker-tag next">NEXT</span>';
                else if (isMine) tag = '<span class="tracker-tag waiting">WAITING</span>';
                h += '<div class="' + rc + '" onclick="selectPlayer(' + ti + ')"><div class="tracker-radio"></div><input class="tracker-name" type="text" data-tindex="' + ti + '" placeholder="Player ' + ti + '" value="' + esc(nm) + '" onclick="event.stopPropagation()" oninput="onNameInput(this)" />' + tag + '<button class="row-link-btn" title="Copy link for this player" onclick="event.stopPropagation();copyPlayerLink(' + ti + ',this)">' + linkIcon + '</button></div>';
            } else {
                var oc = 'tracker-opp'; if (isCurr) oc += ' is-current';
                var st = isB ? '⚫' : '⚪', lb = isCurr ? st + ' playing' : st;
                h += '<div class="' + oc + '"><div class="tracker-opp-line"></div><span class="tracker-opp-text">' + lb + '</span><div class="tracker-opp-line"></div></div>';
            }
        }
    } else {
        for (var j = 0; j < N; j++) {
            var isY = j === P, rc2 = 'tracker-row' + (isY ? ' is-you' : '');
            var tag2 = isY ? '<span class="tracker-tag waiting">WAITING</span>' : '';
            h += '<div class="' + rc2 + '" onclick="selectPlayer(' + j + ')"><div class="tracker-radio"></div><input class="tracker-name" type="text" data-tindex="' + j + '" placeholder="Player ' + j + '" value="' + esc(teamNames[j] || '') + '" onclick="event.stopPropagation()" oninput="onNameInput(this)" />' + tag2 + '<button class="row-link-btn" title="Copy link for this player" onclick="event.stopPropagation();copyPlayerLink(' + j + ',this)">' + linkIcon + '</button></div>';
        }
    }
    h += '</div>';
    if (hasGame) {
        var dist = turnInfo.dist, sc, stxt;
        if (dist === 0) { sc = 'now'; stxt = '🟢 Your turn!'; }
        else if (dist === 1) { sc = 'soon'; stxt = '🟡 <span class="num">1</span> move away'; }
        else { sc = 'later'; stxt = '⏳ <span class="num">' + dist + '</span> moves away'; }
        h += '<div class="tracker-status ' + sc + '">' + stxt + '</div>';
    } else {
        h += '<div class="tracker-hint">Click a row to select yourself</div>';
    }
    c.innerHTML = h;
    if (fi !== undefined) {
        var inp = c.querySelector('[data-tindex="' + fi + '"]');
        if (inp) { inp.focus(); if (cp != null) inp.setSelectionRange(cp, cp); }
    }
}

renderTracker();

/* ── Search ─────────────────────────────────────── */
var searchDebounce = null;
var waitingTimer = null;
var waitingCountdown = null;

function setInputState(state) {
    var el = document.getElementById('username');
    el.classList.remove('is-loading', 'is-found', 'is-error');
    if (state) el.classList.add(state);
}

function stopWaiting() {
    clearInterval(waitingCountdown);
    waitingCountdown = null;
    waitingTimer = null;
}

document.getElementById('username').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') { clearTimeout(searchDebounce); search(); }
});
document.getElementById('username').addEventListener('input', function () {
    clearTimeout(searchDebounce);
    searchDebounce = setTimeout(function() { search(); }, 600);
});

async function search() {
    var name = document.getElementById('username').value.trim();
    if (!name) return;
    stopPolling(); stopWaiting(); clearState(); clearApiError(); clearBlame(); wsDisconnect();
    gameOverInProgress = false;
    consecutiveErrors = 0;
    setInputState('is-loading');
    showStatus('🔍 Looking up ' + esc(name) + '…');
    dbg('search: looking up "' + name + '"', 'info');

    try {
        var pData = await api('/players/?username=' + enc(name));
        var match = null;
        if (pData.results) {
            match = pData.results.find(function (p) { return p.username.toLowerCase() === name.toLowerCase(); }) || pData.results[0];
        }
        if (!match) { setInputState('is-error'); showStatus('Player "' + esc(name) + '" not found.', true); return; }

        playerId = match.id; playerName = match.username.toLowerCase();
        prevMoves = {}; cachedStates = {}; cachedActiveGames = []; lastEntries = [];
        dbg('search: found ' + match.username + ' id=' + playerId, 'ok');
        if (!teamNames[myPlayerIndex]) teamNames[myPlayerIndex] = match.username;
        syncURL(); saveSettings();

        var full = await api('/players/' + playerId + '/full/');
        cachedActiveGames = full.active_games || [];
        dbg('search: ' + cachedActiveGames.length + ' active games', 'ok');

        setInputState(null);

        if (!cachedActiveGames.length) {
            showStatus('✔ Found <strong>' + esc(match.username) + '</strong> — waiting for an active game… <span id="waitCountdown">10</span>s');
            startWaitingForGame();
            return;
        }

        activateGame();

    } catch (err) {
        dbg('search: ERROR: ' + err.message, 'err');
        setInputState('is-error');
        handleErr(err);
    }
}

function startWaitingForGame() {
    stopWaiting();
    var INTERVAL = 10;
    var remaining = INTERVAL;

    function updateCountdown() {
        var el = document.getElementById('waitCountdown');
        if (el) el.textContent = remaining;
    }

    async function doCheck() {
        if (!playerId) { stopWaiting(); return; }
        dbg('waitingForGame: checking…', 'info');
        try {
            var full = await api('/players/' + playerId + '/full/');
            cachedActiveGames = full.active_games || [];
            if (cachedActiveGames.length) {
                dbg('waitingForGame: game found!', 'ok');
                stopWaiting();
                activateGame();
                return;
            }
        } catch(err) {
            dbg('waitingForGame: error ' + err.message, 'err');
        }
        remaining = INTERVAL;
        updateCountdown();
    }

    waitingCountdown = setInterval(function() {
        remaining--;
        if (remaining <= 0) {
            remaining = 0;
            updateCountdown();
            doCheck();
        } else {
            updateCountdown();
        }
    }, 1000);

    waitingTimer = true; // mark as active so stopWaiting knows
}

function activateGame() {
    wsConnect();
    cachedActiveGames.slice(0, 5).forEach(function (g) { wsSubscribeGame(g.id); });
    pollStates();
    startPolling();
}

/* ── Color / Turn ───────────────────────────────── */
function getColor(game) {
    if (game.players && game.players.black && game.players.black.id != null && game.players.black.id == playerId) return 'black';
    if (game.players && game.players.white && game.players.white.id != null && game.players.white.id == playerId) return 'white';
    if (game.black == playerId) return 'black';
    if (game.white == playerId) return 'white';
    if (game.players && game.players.black && game.players.black.username && game.players.black.username.toLowerCase() === playerName) return 'black';
    if (game.players && game.players.white && game.players.white.username && game.players.white.username.toLowerCase() === playerName) return 'white';
    if (game.json && game.json.players && game.json.players.black && game.json.players.black.id == playerId) return 'black';
    if (game.json && game.json.players && game.json.players.white && game.json.players.white.id == playerId) return 'white';
    return null;
}

function getTurnInfo(Z, N, P, color, handicap) {
    if (typeof Z !== 'number' || !color)
        return { myTurn: false, imNext: false, dist: 0, currentSlot: 0, playerSlot: 0 };
    var hc = handicap >= 2;
    var t = 2 * N, pS = (color === 'white') !== hc ? 2 * P + 1 : 2 * P, cS = Z % t, d = (pS - cS + t) % t;
    return { myTurn: d === 0, imNext: d === 1, dist: d, currentSlot: cS, playerSlot: pS };
}

/* ── Render ─────────────────────────────────────── */
function render(entries) {
    renderTracker();
    var N = numPlayers, P = myPlayerIndex;
    var anyMyTurn = false, anyImNext = false, gameLinksHTML = '';
    for (var i = 0; i < entries.length; i++) {
        var game = entries[i].game, state = entries[i].state;
        var Z = state ? (state.move_number != null ? state.move_number : null) : null;
        var color = getColor(game);
        var hc = state && state.handicap ? state.handicap : 0;
        var info = getTurnInfo(Z, N, P, color, hc);
        if (info.myTurn) anyMyTurn = true;
        if (info.imNext) anyImNext = true;
        prevMoves[game.id] = Z;
        gameLinksHTML += '<a class="game-link" href="https://online-go.com/game/' + game.id + '" target="_blank" rel="noopener">↗ Open on OGS</a>';
    }
    var cc = wsConnected ? 'live' : 'poll';
    var ct = wsConnected ? 'live' : 'polling ' + (currentInterval / 1000) + 's';
    var linksHTML = '<div class="footer-row"><div class="footer-links">' + gameLinksHTML + '</div><div class="footer-meta"><span class="conn-badge ' + cc + '"><span class="conn-dot"></span>' + ct + '</span><span class="refresh-info">Updated: ' + new Date().toLocaleTimeString('en-GB') + '</span></div></div>';
    document.getElementById('results').innerHTML = linksHTML;
    document.body.classList.toggle('my-turn', anyMyTurn);
    document.body.classList.toggle('im-next', !anyMyTurn && anyImNext);
    updateAlarm(anyMyTurn);
}

/* ── Helpers ────────────────────────────────────── */
async function api(path) {
    var r = await fetch(API + path);
    if (!r.ok) { var e = new Error('API ' + r.status + ': ' + path); e.apiStatus = r.status; throw e; }
    return r.json();
}
function clearState() { document.body.classList.remove('my-turn', 'im-next'); stopAlarm(); stopWaiting(); wasMyTurn = false; }
function showStatus(m, e) { document.getElementById('results').innerHTML = '<div class="status-msg ' + (e ? 'error' : '') + '">' + m + '</div>'; }
function handleErr(e) { console.error(e); showStatus(e instanceof TypeError ? '⚠️ Network/CORS error.' : '❌ ' + e.message, true); }
function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function enc(s) { return encodeURIComponent(s); }
</script>
