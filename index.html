<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OGS Live Tracker</title>
    <style>
        :root {
            --bg: #0f0f1a;
            --card: #1a1a2e;
            --accent: #e94560;
            --text: #eaeaea;
            --muted: #888;
            --green: #22c55e;
            --amber: #f59e0b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            transition: background 0.6s ease;
        }

        body.my-turn { background: #052e16; }
        body.my-turn .game-card {
            border-color: var(--green);
            box-shadow: 0 0 40px rgba(34,197,94,0.35), 0 0 100px rgba(34,197,94,0.15);
        }
        body.my-turn .move-number { color: var(--green); }

        body.im-next { background: #1a1000; }
        body.im-next .game-card {
            border-color: var(--amber);
            box-shadow: 0 0 35px rgba(245,158,11,0.25);
            animation: glowPulse 2s ease infinite;
        }
        body.im-next .move-number { color: var(--amber); }
        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 35px rgba(245,158,11,0.25); }
            50%      { box-shadow: 0 0 60px rgba(245,158,11,0.45); }
        }

        .turn-banner {
            display: none;
            font-size: 1.5em;
            font-weight: 800;
            padding: 16px 40px;
            border-radius: 12px;
            margin-bottom: 24px;
            text-align: center;
        }
        .banner-myturn { background: var(--green); color: #052e16; animation: pulse 1.4s ease infinite; }
        .banner-next   { background: var(--amber); color: #1a0f00; animation: pulse 2s ease infinite; }
        body.my-turn .banner-myturn { display: block; }
        body.im-next:not(.my-turn) .banner-next { display: block; }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50%      { transform: scale(1.03); opacity: 0.85; }
        }
        .turn-wait {
            display: none;
            color: var(--muted);
            font-size: 1em;
            padding: 10px 24px;
            border: 1px solid #2a2a4a;
            border-radius: 10px;
            margin-bottom: 24px;
        }
        body:not(.my-turn):not(.im-next) .turn-wait.visible { display: block; }

        h1 { font-size: 2em; margin-bottom: 6px; }
        .subtitle { color: var(--muted); margin-bottom: 32px; }
        .search-box {
            display: flex; gap: 10px;
            width: 100%; max-width: 500px;
            margin-bottom: 16px;
        }
        input[type="text"], input[type="number"] {
            padding: 14px 18px;
            border: 2px solid #2a2a4a;
            border-radius: 10px;
            background: var(--card);
            color: var(--text);
            font-size: 1em;
            transition: border-color 0.3s;
        }
        input[type="text"] { flex: 1; }
        input:focus { outline: none; border-color: var(--accent); }
        button {
            padding: 14px 28px;
            background: var(--accent);
            border: none; border-radius: 10px;
            color: white; font-size: 1em;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
        }
        button:hover { background: #c73652; }
        button:active { transform: scale(0.97); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .rengo-settings {
            display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
            width: 100%; max-width: 500px; margin-bottom: 12px;
        }
        .rengo-settings label { color: var(--muted); font-size: 0.9em; white-space: nowrap; }
        .rengo-settings input[type="number"] { width: 70px; text-align: center; }
        .rengo-info {
            width: 100%; color: var(--muted);
            font-size: 0.78em; line-height: 1.5; margin-top: 2px;
        }
        .options {
            display: flex; align-items: center; gap: 8px;
            margin-bottom: 28px; color: var(--muted); font-size: 0.9em;
        }
        .options input[type="checkbox"] { accent-color: var(--accent); }

        #results { width: 100%; max-width: 500px; }

        .game-card {
            background: var(--card);
            border-radius: 14px; padding: 28px;
            margin-bottom: 16px;
            border: 2px solid #2a2a4a;
            transition: border-color 0.5s, box-shadow 0.5s;
        }
        .players {
            display: flex; justify-content: space-between;
            align-items: center; gap: 12px;
        }
        .player { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 0.95em; }
        .stone { width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0; }
        .stone.black {
            background: radial-gradient(circle at 35% 35%, #555, #111);
            border: 1px solid #333;
        }
        .stone.white {
            background: radial-gradient(circle at 35% 35%, #fff, #ccc);
            border: 1px solid #aaa;
        }
        .vs { color: var(--muted); font-size: 0.85em; }

        .move-display { text-align: center; margin: 28px 0 16px; }
        .move-label {
            color: var(--muted); font-size: 0.8em;
            text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px;
        }
        .move-number {
            font-size: 5em; font-weight: 800;
            color: var(--accent); line-height: 1;
            transition: color 0.4s;
        }
        .move-number.bump { animation: bump 0.4s ease; }
        @keyframes bump {
            0%   { transform: scale(1); }
            50%  { transform: scale(1.18); }
            100% { transform: scale(1); }
        }

        .game-info {
            text-align: center; color: var(--muted);
            font-size: 0.85em; margin-top: 6px;
        }

        /* ── Zyklus-Visualisierung ──────────────── */
        .cycle-container {
            margin: 24px 0 8px;
            padding: 18px 12px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
        }
        .cycle-label {
            text-align: center;
            color: var(--muted);
            font-size: 0.75em;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 14px;
        }
        .cycle-track {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0;
            flex-wrap: wrap;
        }
        .cycle-slot {
            width: 44px; height: 44px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.85em; font-weight: 700;
            background: #1e1e36;
            border: 2px solid #2a2a4a;
            color: var(--muted);
            position: relative;
            transition: all 0.4s ease;
            flex-shrink: 0;
        }
        .cycle-slot.is-current {
            background: #2a2a5a;
            border-color: var(--accent);
            color: var(--text);
            box-shadow: 0 0 14px rgba(233,69,96,0.4);
            transform: scale(1.12);
        }
        .cycle-slot.is-mine {
            border-color: var(--green);
        }
        .cycle-slot.is-current.is-mine {
            background: #0a3d1f;
            border-color: var(--green);
            color: var(--green);
            box-shadow: 0 0 20px rgba(34,197,94,0.5);
        }
        .cycle-slot.is-next-mine {
            border-color: var(--amber);
            border-style: dashed;
        }
        .cycle-slot-label {
            position: absolute;
            top: -18px;
            font-size: 0.6em;
            font-weight: 700;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        .cycle-slot-label.du { color: var(--green); }
        .cycle-slot-label.jetzt { color: var(--accent); }
        .cycle-arrow {
            color: #2a2a4a;
            font-size: 0.7em;
            padding: 0 3px;
            flex-shrink: 0;
        }
        .cycle-countdown {
            text-align: center;
            margin-top: 16px;
            font-size: 1em;
            font-weight: 600;
        }
        .cycle-countdown .number {
            font-size: 1.3em;
            font-weight: 800;
        }
        .cycle-countdown.now   { color: var(--green); }
        .cycle-countdown.soon  { color: var(--amber); }
        .cycle-countdown.later { color: var(--muted); }

        .player-calc {
            text-align: center; color: var(--muted);
            font-size: 0.78em; margin-top: 10px;
            font-family: 'Courier New', monospace;
        }
        .game-link {
            display: block; text-align: center;
            color: var(--accent); text-decoration: none;
            margin-top: 18px; font-size: 0.95em;
        }
        .game-link:hover { opacity: 0.8; }
        .status-msg {
            text-align: center; padding: 28px;
            color: var(--muted); line-height: 1.6;
        }
        .status-msg.error { color: var(--accent); }
        .live-dot {
            display: inline-block; width: 8px; height: 8px;
            border-radius: 50%; margin-right: 4px;
            animation: blink 1.5s infinite;
        }
        .live-dot.green { background: #4ade80; }
        .live-dot.amber { background: #fbbf24; }
        .live-dot.grey  { background: #666; }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%      { opacity: 0.3; }
        }
        .refresh-info {
            text-align: center; color: var(--muted);
            font-size: 0.75em; margin-top: 14px;
        }
    </style>
</head>
<body>

    <h1>⚫⚪ OGS Live Tracker</h1>
    <p class="subtitle">Verfolge laufende Go-Spiele in Echtzeit</p>

    <div class="search-box">
        <input type="text" id="username"
               placeholder="OGS Benutzername eingeben…" autocomplete="off">
        <button id="searchBtn" onclick="search()">Suchen</button>
    </div>

    <div class="rengo-settings">
        <label for="numPlayers">Spieler pro Team (N):</label>
        <input type="number" id="numPlayers" min="1" max="20" value="2">
        <label for="myPlayer">Dein Platz (P):</label>
        <input type="number" id="myPlayer" min="0" max="19" value="0">
        <div class="rengo-info">
            ⌊Z÷2⌋ mod N = P → Du bist dran
        </div>
    </div>

    <div class="options">
        <input type="checkbox" id="autoRefresh" checked>
        <label for="autoRefresh">Auto-Refresh (alle 5 s)</label>
    </div>

    <div class="turn-banner banner-myturn">🟢 DU BIST DRAN!</div>
    <div class="turn-banner banner-next">🟡 MACH DICH BEREIT!</div>
    <div class="turn-wait visible" id="turnWait">⏳ Warte auf deinen Zug…</div>

    <div id="results"></div>

<script>
const API = 'https://online-go.com/api/v1';

let timer     = null;
let playerId  = null;
let prevMoves = {};

document.getElementById('username')
    .addEventListener('keydown', e => { if (e.key === 'Enter') search(); });

async function search() {
    const name = document.getElementById('username').value.trim();
    if (!name) return;

    const btn = document.getElementById('searchBtn');
    btn.disabled = true;
    btn.textContent = '…';
    stopTimer(); clearState();
    showStatus('🔍 Suche Spieler…');

    try {
        const pData = await api(`/players/?username=${enc(name)}`);
        const match = pData.results?.find(
            p => p.username.toLowerCase() === name.toLowerCase()
        ) || pData.results?.[0];

        if (!match) { showStatus(`Spieler „${name}" nicht gefunden.`, true); return; }

        playerId  = match.id;
        prevMoves = {};
        await loadGames();
        startTimer();
    } catch (err) { handleErr(err); }
      finally     { btn.disabled = false; btn.textContent = 'Suchen'; }
}

async function loadGames() {
    if (!playerId) return;
    try {
        const full  = await api(`/players/${playerId}/full/`);
        const games = full.active_games || [];

        if (!games.length) {
            showStatus('Kein aktives Spiel gefunden.');
            clearState(); stopTimer(); return;
        }

        const entries = await Promise.all(
            games.slice(0, 5).map(async g => {
                try   { return { game: g, state: await api(`/games/${g.id}/state/`) }; }
                catch { return { game: g, state: null }; }
            })
        );
        render(entries);
    } catch (err) { console.error('Refresh:', err); }
}

function getTurnInfo(Z, N, P) {
    if (typeof Z !== 'number') return { myTurn: false, imNext: false, dist: 0 };
    const pos    = Math.floor(Z / 2) % N;
    const dist   = (P - pos + N) % N;           // 0 = jetzt, 1 = nächster, etc.
    const myTurn = dist === 0;
    const imNext = dist === 1;
    return { myTurn, imNext, dist, pos };
}

function buildCycleHTML(Z, N, P) {
    if (typeof Z !== 'number') return '';

    const { pos, dist } = getTurnInfo(Z, N, P);

    let slots = '';
    for (let i = 0; i < N; i++) {
        const isCurrent = (i === pos);
        const isMine    = (i === P);
        const isNextMine = (!isCurrent && isMine && dist === 1);

        let cls = 'cycle-slot';
        if (isCurrent)  cls += ' is-current';
        if (isMine)     cls += ' is-mine';
        if (isNextMine) cls += ' is-next-mine';

        let label = '';
        if (isMine && isCurrent) label = '<span class="cycle-slot-label du">▼ DU</span>';
        else if (isMine)         label = '<span class="cycle-slot-label du">DU</span>';
        else if (isCurrent)      label = '<span class="cycle-slot-label jetzt">▼</span>';

        slots += `<div class="${cls}">${label}${i}</div>`;
        if (i < N - 1) slots += '<div class="cycle-arrow">→</div>';
    }

    /* Countdown-Text */
    let cdClass, cdText;
    if (dist === 0) {
        cdClass = 'now';
        cdText  = '🟢 Jetzt!';
    } else if (dist === 1) {
        cdClass = 'soon';
        cdText  = `🟡 Noch <span class="number">1</span> Runde (${1 * 2} Züge)`;
    } else {
        cdClass = 'later';
        cdText  = `⏳ Noch <span class="number">${dist}</span> Runden (${dist * 2} Züge)`;
    }

    return `
    <div class="cycle-container">
        <div class="cycle-label">Rotations-Zyklus</div>
        <div class="cycle-track">${slots}</div>
        <div class="cycle-countdown ${cdClass}">${cdText}</div>
    </div>`;
}

function render(entries) {
    const N = Math.max(1, parseInt(document.getElementById('numPlayers').value) || 1);
    const P = Math.max(0, parseInt(document.getElementById('myPlayer').value)  || 0);

    let html = '', anyMyTurn = false, anyImNext = false;

    for (const { game, state } of entries) {
        const Z     = state?.move_number ?? null;
        const black = game.players?.black?.username ?? '?';
        const white = game.players?.white?.username ?? '?';
        const size  = game.width || 19;

        const { myTurn, imNext, dist, pos } = getTurnInfo(Z, N, P);
        if (myTurn) anyMyTurn = true;
        if (imNext) anyImNext = true;

        const changed = (prevMoves[game.id] !== undefined && prevMoves[game.id] !== Z);
        prevMoves[game.id] = Z;

        const whoseTurn = (typeof Z === 'number') ? (Z % 2 === 0 ? 'Schwarz' : 'Weiß') : '?';
        const dotClass  = myTurn ? 'green' : imNext ? 'amber' : 'grey';

        const calcText = (typeof Z === 'number')
            ? `⌊${Z}÷2⌋ mod ${N} = ${pos} → Platz ${pos} ist dran${myTurn ? ' = DU ✅' : ''}`
            : '';

        const cycleHTML = buildCycleHTML(Z, N, P);

        html += `
        <div class="game-card">
            <div class="players">
                <div class="player">
                    <div class="stone black"></div>
                    <span>${esc(black)}</span>
                </div>
                <span class="vs">vs</span>
                <div class="player">
                    <span>${esc(white)}</span>
                    <div class="stone white"></div>
                </div>
            </div>

            <div class="move-display">
                <div class="move-label">
                    <span class="live-dot ${dotClass}"></span>Zug Nummer
                </div>
                <div class="move-number ${changed ? 'bump' : ''}">${Z ?? '?'}</div>
            </div>

            <div class="game-info">${size}×${size} · ${whoseTurn} am Zug</div>

            ${cycleHTML}

            <div class="player-calc">${calcText}</div>

            <a class="game-link" href="https://online-go.com/game/${game.id}"
               target="_blank" rel="noopener">↗ Spiel auf OGS öffnen</a>
        </div>`;
    }

    html += `<div class="refresh-info">Aktualisiert: ${new Date().toLocaleTimeString('de-DE')}</div>`;
    document.getElementById('results').innerHTML = html;

    document.body.classList.toggle('my-turn', anyMyTurn);
    document.body.classList.toggle('im-next', !anyMyTurn && anyImNext);
    document.getElementById('turnWait')
        .classList.toggle('visible', !anyMyTurn && !anyImNext);
}

/* ── Helfer ─────────────────────────────────────── */
async function api(path) {
    const r = await fetch(API + path);
    if (!r.ok) throw new Error(`API ${r.status}: ${path}`);
    return r.json();
}
function startTimer() {
    stopTimer();
    timer = setInterval(() => {
        if (document.getElementById('autoRefresh').checked) loadGames();
    }, 5000);
}
function stopTimer()  { clearInterval(timer); timer = null; }
function clearState() {
    document.body.classList.remove('my-turn', 'im-next');
    document.getElementById('turnWait').classList.remove('visible');
}
function showStatus(msg, err) {
    document.getElementById('results').innerHTML =
        `<div class="status-msg ${err ? 'error' : ''}">${msg}</div>`;
}
function handleErr(e) {
    console.error(e);
    showStatus(e instanceof TypeError
        ? '⚠️ Netzwerk-/CORS-Fehler – öffne die Seite über einen Webserver.'
        : '❌ ' + e.message, true);
}
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function enc(s) { return encodeURIComponent(s); }

document.getElementById('numPlayers').addEventListener('input', () => { if (playerId) loadGames(); });
document.getElementById('myPlayer').addEventListener('input',  () => { if (playerId) loadGames(); });
</script>
</body>
</html>
